name: CI Pipeline - Calculadora

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache de Dependencias
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{hashFiles('**/package-lock.json')}}

      - name: Instalar dependências
        run: npm install  

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2

      - name: Verificar vulnerabilidade
        run: npm audit --audit-level=high

  quality:
    runs-on: ubuntu-latest
    needs: security
  
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache de Dependencias
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{hashFiles('**/package-lock.json')}}
      
      - name: Instalar dependências
        run: npm install

      - name: Rodar lint
        run: npm run lint

      - name: Run Coverage
        run: npm run test -- --coverage

      - name: Análise com SonarCloud 
        uses: SonarSource/sonarcloud-github-action@v2 
        with: 
          args: > 
            -Dsonar.projectKey=MSCiriaco81_calculadora
            -Dsonar.organization=msciriaco81
        env: 
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Rodar build
        run: echo "Build realizado com sucesso"

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x, 24.x]
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Cache de Dependencias
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ matrix.os }}-node-${{ matrix.node-version }}-${{hashFiles('**/package-lock.json')}}

      - name: Instalar dependências
        run: npm install

      - name: Rodar testes
        run: npm test

  deploy: 
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: production
    
    steps:
      - name: Simular deploy
        run: echo "Deploy realizado com sucesso"